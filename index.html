<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boolmung Campfire</title>
  <link rel="stylesheet" href="./src/styles/sky.css">
  <link rel="stylesheet" href="./src/styles/horizon.css">
  <link rel="stylesheet" href="./src/styles/ground.css">
  <style>
    :root {
      --night-top: #07111f;
      --night-bottom: #130905;
      --ground-top: #59341b;
      --ground-bottom: #24130a;
      --ember: #ff971f;
      --flame-core: #fff6d8;
      --flame-mid: #ffc45b;
      --flame-edge: #ff8a1f;
      --flame-blue: #3c64ff;
      --smoke: rgba(255, 240, 220, 0.14);
      --view-scene-scale: 1;
      --view-world-y: 0px;
      --view-ground-inset: 68vh;
      --view-horizon-bottom: 26vh;
      --view-tent-scale: 1;
      --view-sky-height: 76vh;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #04070d;
      font-family: "Georgia", serif;
    }

    body[data-view="sky"] {
      --view-scene-scale: 0.84;
      --view-world-y: 78vh;
      --view-tent-scale: 0.86;
      --view-sky-height: 100vh;
    }

    body[data-view="sky"] .night-sky {
      height: 100vh;
    }

    body[data-view="sky"] .night-horizon,
    body[data-view="sky"] .dirt-ground {
      opacity: 0;
      transform: translate3d(0, var(--view-world-y), 0);
    }

    body[data-view="sky"] .ground-light,
    body[data-view="sky"] .hearth-canvas,
    body[data-view="sky"] .flame-real-video {
      opacity: 0;
      filter: blur(10px);
    }

    body[data-view="sky"] .hearth-canvas,
    body[data-view="sky"] .flame-real-video {
      background:
        linear-gradient(180deg, rgba(6, 16, 31, 0.92), rgba(11, 19, 32, 0.92));
      border-radius: 22px;
    }

    .scene {
      position: relative;
      width: min(72vw, 430px);
      aspect-ratio: 0.82 / 1.22;
      display: flex;
      align-items: end;
      justify-content: center;
      isolation: isolate;
      filter: saturate(1.08);
      z-index: 1;
      transform: translateY(var(--view-world-y)) scale(var(--view-scene-scale));
      transform-origin: 50% 82%;
      transition:
        transform 0.8s cubic-bezier(0.2, 0.74, 0.24, 1),
        filter 0.45s ease;
    }

    body[data-view="sky"] .scene {
      filter: saturate(1) brightness(0.94);
    }

    .moon {
      position: fixed;
      top: 7vh;
      right: 8vw;
      width: clamp(26px, 3.5vw, 44px);
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 30%, rgba(255, 255, 255, 0.95) 0 8%, rgba(255, 246, 220, 0.94) 32%, rgba(216, 224, 238, 0.92) 68%, rgba(185, 197, 219, 0.88) 100%);
      box-shadow:
        0 0 18px rgba(255, 248, 214, 0.22),
        0 0 48px rgba(173, 196, 255, 0.08);
      overflow: hidden;
      z-index: 1;
      opacity: 0.96;
      transform: translate3d(0, 0, 0) scale(1);
      transition: transform 1.1s cubic-bezier(0.2, 0.74, 0.24, 1);
    }

    body[data-view="sky"] .moon {
      transform: translate3d(-4vw, 1.5vh, 0) scale(1.16);
    }

    .moon.site-phase-active {
      background-image: var(--moon-phase-image);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .moon::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 26% 34%, rgba(126, 138, 166, 0.16) 0 10%, transparent 11%),
        radial-gradient(circle at 68% 28%, rgba(126, 138, 166, 0.12) 0 8%, transparent 9%),
        radial-gradient(circle at 56% 64%, rgba(126, 138, 166, 0.15) 0 12%, transparent 13%);
      mix-blend-mode: multiply;
    }

    .moon::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 32% 30%, rgba(255, 255, 255, 0.95) 0 8%, rgba(255, 246, 220, 0.94) 32%, rgba(216, 224, 238, 0.92) 68%, rgba(185, 197, 219, 0.88) 100%);
      opacity: 0;
      pointer-events: none;
      mix-blend-mode: color;
    }

    .moon.site-phase-active::before {
      opacity: 0;
    }

    .moon.site-phase-active::after {
      opacity: 1;
    }

    .moon-shadow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: #091326;
      transform: translateX(var(--moon-shadow-x, 0%)) scaleX(var(--moon-shadow-scale, 1));
      opacity: var(--moon-shadow-opacity, 1);
    }

    .moon.site-phase-active .moon-shadow {
      opacity: 0;
    }

    .moon-glow {
      position: absolute;
      inset: -18%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 244, 202, 0.12), transparent 62%);
      filter: blur(12px);
      z-index: -1;
    }

    .visit-stats {
      position: fixed;
      top: 24px;
      left: 28px;
      z-index: 12;
      display: grid;
      gap: 5px;
      color: rgba(225, 236, 255, 0.82);
      font-family: "Georgia", serif;
      font-size: 12px;
      line-height: 1.35;
      letter-spacing: 0.08em;
      text-shadow:
        0 0 8px rgba(205, 222, 255, 0.28),
        0 1px 8px rgba(0, 0, 0, 0.72);
      pointer-events: none;
      user-select: none;
    }

    .visit-stats strong {
      color: rgba(255, 249, 225, 0.94);
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .visit-stats[data-state="local"],
    .visit-stats[data-state="unavailable"] {
      opacity: 0.55;
    }

    .screen-controls {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 12;
    }

    .sound-toggle,
    .view-toggle,
    .fullscreen-toggle {
      padding: 12px 16px;
      border: 1px solid rgba(255, 224, 180, 0.22);
      border-radius: 999px;
      background: rgba(10, 14, 24, 0.5);
      color: rgba(255, 239, 222, 0.92);
      font: inherit;
      font-size: 14px;
      letter-spacing: 0.04em;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
      cursor: pointer;
    }

    .sound-toggle:hover,
    .view-toggle:hover,
    .fullscreen-toggle:hover {
      background: rgba(22, 28, 42, 0.64);
    }

    .sound-toggle,
    .view-toggle,
    .fullscreen-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid rgba(255, 224, 180, 0.24);
      background: rgba(10, 14, 24, 0.54);
    }

    .view-toggle.is-locked {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(8px) scale(0.92);
      transition:
        opacity 0.35s ease,
        transform 0.4s ease,
        visibility 0s linear 0.4s;
    }

    .view-toggle.is-unlocked {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0) scale(1);
      transition:
        opacity 0.35s ease,
        transform 0.4s ease,
        visibility 0s linear 0s;
    }

    .sound-toggle svg,
    .view-toggle svg,
    .fullscreen-toggle svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sound-toggle .icon-sound-on,
    .fullscreen-toggle .icon-collapse {
      display: none;
    }

    .sound-toggle[aria-pressed="true"] .icon-sound-off {
      display: none;
    }

    .sound-toggle[aria-pressed="true"] .icon-sound-on {
      display: block;
    }

    .fullscreen-toggle[aria-pressed="true"] .icon-expand {
      display: none;
    }

    .fullscreen-toggle[aria-pressed="true"] .icon-collapse {
      display: block;
    }

    /* 박동하며 크기가 변하던 레거시 글로우/연기는 제거 — 불은 한자리에서 고정으로 탄다. */
    .glow { display: none; }
    .smoke { display: none; }

    .smoke.s1 { left: 38%; animation-delay: 0s; }
    .smoke.s2 { left: 46%; animation-delay: 1.8s; transform: scale(0.85); }
    .smoke.s3 { left: 42%; animation-delay: 3.7s; transform: scale(1.1); }

    .ground {
      display: none;
    }

    .pit {
      display: none;
    }

    .stone-ring {
      /* 사실적인 화로에서는 장작·잉걸불이 주인공이라 카툰풍 돌 링은 숨긴다. */
      display: none;
    }

    .stone {
      position: absolute;
      width: 22%;
      height: 34%;
      border-radius: 38% 42% 40% 44%;
      background:
        radial-gradient(circle at 38% 28%, rgba(255, 207, 151, 0.16), transparent 28%),
        radial-gradient(circle at 58% 62%, rgba(62, 40, 29, 0.64), transparent 34%),
        linear-gradient(180deg, #4a3429 0%, #2c211d 38%, #1a1413 74%, #0e0c0c 100%);
      box-shadow:
        inset 0 2px 2px rgba(255, 224, 184, 0.1),
        inset 0 -8px 10px rgba(0, 0, 0, 0.38),
        0 8px 12px rgba(0, 0, 0, 0.26);
      filter: saturate(0.72) brightness(0.9);
    }

    .stone::before {
      content: "";
      position: absolute;
      inset: 18% 14% 22%;
      border-radius: 36% 44% 42% 40%;
      background:
        linear-gradient(145deg, rgba(255, 228, 196, 0.08), transparent 32%),
        radial-gradient(circle at 62% 76%, rgba(0, 0, 0, 0.18), transparent 30%);
      opacity: 0.9;
    }

    .stone.s1 { left: 4%; bottom: 18%; transform: rotate(-18deg); }
    .stone.s2 { left: 14%; bottom: 10%; transform: rotate(-10deg); }
    .stone.s3 { left: 27%; bottom: 5%; transform: rotate(-2deg); }
    .stone.s4 { left: 39%; bottom: 2%; transform: rotate(3deg); }
    .stone.s5 { left: 51%; bottom: 4%; transform: rotate(6deg); }
    .stone.s6 { left: 63%; bottom: 9%; transform: rotate(10deg); }
    .stone.s7 { left: 74%; bottom: 18%; transform: rotate(16deg); }
    .stone.s8 {
      left: 19%;
      bottom: 26%;
      width: 18%;
      height: 28%;
      transform: rotate(-12deg);
      filter: saturate(0.68) brightness(0.82);
    }
    .stone.s9 {
      right: 19%;
      bottom: 26%;
      width: 18%;
      height: 28%;
      transform: rotate(14deg);
      filter: saturate(0.68) brightness(0.82);
    }

    /* 장작·잉걸불(화로)은 src/scene/hearth.js 의 캔버스가 렌더링한다. */

    .camp-tent {
      position: fixed;
      left: clamp(-28px, -2vw, -14px);
      bottom: calc(32vh - 16px);
      width: clamp(90px, 11vw, 160px);
      aspect-ratio: 1.18 / 1;
      z-index: 1;
      pointer-events: none;
      filter:
        drop-shadow(0 18px 28px rgba(0, 0, 0, 0.48))
        drop-shadow(0 0 28px rgba(255, 127, 31, 0.08));
      opacity: 0.92;
      transform: translateY(var(--view-world-y)) scale(var(--view-tent-scale));
      transform-origin: 50% 100%;
      transition: transform 0.8s cubic-bezier(0.2, 0.74, 0.24, 1);
    }

    .tent-shadow {
      position: absolute;
      left: -9%;
      right: -11%;
      bottom: -3%;
      height: 15%;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 50%, rgba(5, 3, 2, 0.88), rgba(6, 3, 2, 0) 74%);
      filter: blur(5px);
    }

    .tent-glow {
      position: absolute;
      left: 12%;
      right: 12%;
      top: 24%;
      bottom: 15%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 40%, rgba(255, 215, 100, 0.44), rgba(255, 139, 34, 0.19) 40%, rgba(202, 64, 18, 0.05) 68%, transparent 78%);
      filter: blur(20px);
      mix-blend-mode: screen;
      animation: tent-lantern 5.8s ease-in-out infinite;
    }

    .tent-body {
      position: absolute;
      inset: 3% 2% 5%;
      clip-path: polygon(50% 3%, 100% 96%, 0 96%);
      background:
        linear-gradient(100deg, rgba(5, 4, 4, 0.84) 0 12%, transparent 30%),
        linear-gradient(260deg, rgba(4, 4, 5, 0.88) 0 13%, transparent 34%),
        radial-gradient(ellipse at 49% 45%, rgba(255, 224, 112, 0.54) 0 14%, rgba(230, 122, 32, 0.45) 33%, rgba(104, 34, 15, 0.48) 61%, rgba(8, 5, 5, 0.94) 100%),
        linear-gradient(180deg, rgba(242, 164, 58, 0.34), rgba(62, 19, 11, 0.94));
      box-shadow:
        inset 0 -26px 38px rgba(0, 0, 0, 0.66),
        inset 28px -12px 34px rgba(10, 5, 4, 0.58),
        inset -28px -14px 34px rgba(8, 4, 4, 0.66);
    }

    .tent-body::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 3%, 100% 96%, 0 96%);
      background:
        repeating-linear-gradient(86deg, rgba(255, 238, 189, 0.045) 0 1px, transparent 1px 8px),
        linear-gradient(90deg, rgba(255, 228, 156, 0.06), transparent 35%, rgba(0, 0, 0, 0.22) 76%);
      opacity: 0.78;
    }

    .tent-body::after {
      content: "";
      position: absolute;
      left: 8%;
      right: 8%;
      bottom: 1%;
      height: 16%;
      background:
        linear-gradient(90deg, rgba(2, 2, 2, 0.86), rgba(16, 7, 4, 0.58) 28%, rgba(14, 6, 4, 0.62) 72%, rgba(1, 1, 1, 0.9));
      filter: blur(1px);
    }

    .tent-seam {
      position: absolute;
      bottom: 8%;
      width: 1px;
      height: 78%;
      background: linear-gradient(180deg, rgba(31, 16, 11, 0.24), rgba(18, 8, 6, 0.8));
      box-shadow: 0 0 3px rgba(255, 205, 114, 0.08);
      transform-origin: 50% 100%;
      opacity: 0.72;
    }

    .tent-seam.center {
      left: 50%;
      height: 88%;
      transform: translateX(-50%);
      opacity: 0.88;
    }

    .tent-seam.left {
      left: 30%;
      transform: rotate(-13deg);
    }

    .tent-seam.right {
      right: 30%;
      transform: rotate(13deg);
    }

    .tent-cap {
      position: absolute;
      left: 42.4%;
      top: 0;
      width: 15%;
      height: 18%;
      clip-path: polygon(50% 0, 94% 100%, 6% 100%);
      background:
        linear-gradient(140deg, rgba(19, 16, 17, 0.98), rgba(3, 3, 5, 0.98));
      filter: brightness(0.78);
    }

    .tent-pipe {
      position: absolute;
      left: 53.5%;
      top: -10%;
      width: 2.3%;
      height: 27%;
      border-radius: 999px;
      background:
        linear-gradient(90deg, rgba(11, 11, 13, 0.82), rgba(105, 92, 80, 0.46), rgba(14, 13, 13, 0.88));
      transform: rotate(-2deg);
      box-shadow: 0 0 8px rgba(0, 0, 0, 0.42);
      opacity: 0.72;
    }

    .tent-stake {
      position: absolute;
      bottom: 0;
      width: 9%;
      height: 18%;
      border-radius: 50% 50% 8% 8%;
      background: linear-gradient(180deg, rgba(22, 10, 6, 0.18), rgba(0, 0, 0, 0.72));
      filter: blur(0.5px);
    }

    .tent-stake.left {
      left: 5%;
      transform: rotate(-10deg);
    }

    .tent-stake.right {
      right: 5%;
      transform: rotate(10deg);
    }

    @keyframes tent-lantern {
      0%, 100% { opacity: 0.72; transform: scale(0.98); }
      45% { opacity: 0.92; transform: scale(1.03); }
      70% { opacity: 0.82; transform: scale(1.01); }
    }

    .ground-light {
      position: absolute;
      left: 50%;
      bottom: 8%;
      width: 62%;
      height: 18%;
      transform: translateX(-50%);
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 36%, rgba(255, 210, 132, 0.14), transparent 16%),
        radial-gradient(circle at 50% 42%, rgba(255, 152, 48, 0.12), rgba(255, 104, 22, 0.06) 26%, transparent 40%),
        radial-gradient(circle at 50% 52%, rgba(255, 112, 20, 0.05), transparent 52%);
      filter: blur(12px);
      z-index: 1;
      pointer-events: none;
      transition:
        opacity 0.45s ease,
        filter 0.55s ease;
    }

    /* 화로(장작 + 잉걸불) 캔버스 — 두 불꽃 모드 공통 토대 */
    .hearth-canvas {
      position: absolute;
      left: 50%;
      bottom: 6.5%;
      width: 62%;
      height: 37%;
      transform: translateX(-50%);
      z-index: 3;
      pointer-events: none;
      background: transparent;
      transition:
        opacity 0.38s ease,
        filter 0.5s ease;
    }

    /* 불꽃 레이어 — screen 합성으로 아래 장작/장면을 가산광으로 밝힌다.
       (.scene 의 isolation:isolate 가 합성을 장면 안으로 가둔다) */
    .flame-real-video {
      position: absolute;
      left: 50%;
      bottom: 14%;
      width: 52%;
      height: 45%;
      transform: translateX(-50%);
      z-index: 4;
      pointer-events: none;
      background: transparent;
      transition:
        opacity 0.32s ease,
        filter 0.48s ease;
    }

    .flame-real-video {
      mix-blend-mode: screen;
      opacity: 0.96;
      filter: saturate(1.35) contrast(1.22) brightness(1.08);
      -webkit-mask-image: radial-gradient(70% 82% at 50% 58%, #000 46%, rgba(0, 0, 0, 0.55) 72%, transparent 100%);
      mask-image: radial-gradient(70% 82% at 50% 58%, #000 46%, rgba(0, 0, 0, 0.55) 72%, transparent 100%);
    }

    .flame-real-source {
      display: none;
    }

    .embers {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }


    .character-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 6;
      transition: opacity 0.35s ease;
    }

    .character-3d-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 6;
      visibility: hidden;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      transition:
        opacity 0.18s ease,
        transform 0.8s cubic-bezier(0.2, 0.74, 0.24, 1);
    }

    .character-3d-layer.is-ready {
      visibility: visible;
      opacity: 1;
    }

    body[data-view="sky"] .character-3d-layer.is-ready {
      visibility: hidden;
      opacity: 0;
      transform: translate3d(0, 0, 0);
      transition:
        opacity 0.01s linear,
        transform 0s linear;
    }

    .character-3d-layer canvas {
      position: absolute;
      left: 0;
      bottom: 0;
      display: block;
    }

    .character-expression-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .character-expression {
      position: absolute;
      display: block;
      line-height: 1;
      will-change: opacity, transform;
      filter: drop-shadow(0 4px 10px rgba(255, 244, 226, 0.28));
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
    }

    .has-3d-characters .character-layer {
      opacity: 0;
      visibility: hidden;
    }

    .wanderer {
      position: absolute;
      left: 0;
      top: 0;
      width: clamp(72px, 9vw, 118px);
      aspect-ratio: 2 / 3;
      border: 0;
      padding: 0;
      background: none;
      pointer-events: auto;
      cursor: pointer;
      transform: translate3d(var(--char-x, 0px), var(--char-y, 0px), 0);
      transition:
        transform var(--move-duration, 4.8s) linear,
        filter 0.35s ease;
      filter:
        drop-shadow(0 10px 16px rgba(0, 0, 0, 0.34))
        drop-shadow(0 0 22px rgba(255, 166, 70, 0.18));
      z-index: 1;
    }

    .wanderer::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 4px;
      width: 58%;
      height: 12%;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(16, 7, 4, 0.42), rgba(16, 7, 4, 0) 72%);
      filter: blur(4px);
      opacity: 0.85;
      z-index: -1;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .wanderer:hover,
    .wanderer:focus-visible {
      filter:
        drop-shadow(0 14px 18px rgba(0, 0, 0, 0.42))
        drop-shadow(0 0 28px rgba(255, 188, 104, 0.28));
      outline: none;
    }

    .wanderer img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      user-select: none;
      -webkit-user-drag: none;
      animation: wanderer-bob 1.8s ease-in-out infinite;
      transform-origin: 50% 88%;
    }

    .wanderer.is-paused {
      transition-duration: 0.35s;
    }

    .wanderer.is-paused img {
      animation-duration: 2.5s;
    }

    .wanderer.is-moving img {
      animation: wanderer-walk 0.72s steps(2, end) infinite;
    }

    .wanderer.is-moving::after {
      transform: translateX(-50%) scaleX(1.08);
      opacity: 0.98;
    }

    .ember {
      position: absolute;
      bottom: 22%;
      left: 50%;
      width: 7px;
      height: 7px;
      margin-left: -3.5px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff6dc, #ffc766 44%, rgba(255, 126, 22, 0.34) 74%, transparent 76%);
      box-shadow: 0 0 12px rgba(255, 190, 76, 0.85);
      opacity: 0;
      animation: ember-rise linear infinite;
    }

    .caption {
      position: absolute;
      bottom: -8%;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 235, 214, 0.72);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      font-size: clamp(10px, 1.6vw, 12px);
      white-space: nowrap;
    }

    @keyframes pulse {
      0%, 100% { transform: scaleX(0.94) scaleY(0.88); opacity: 0.68; }
      50% { transform: scaleX(1.08) scaleY(1.12); opacity: 1; }
    }

    @keyframes smoke-rise {
      0% {
        transform: translate3d(0, 0, 0) scale(0.6);
        opacity: 0;
      }
      18% {
        opacity: 0.28;
      }
      100% {
        transform: translate3d(30px, -220px, 0) scale(1.8);
        opacity: 0;
      }
    }

      }
      10% {

      }
      100% {
        transform: translate3d(var(--drift-x), calc(var(--drift-y) * -1), 0) scale(0);
        opacity: 0;
      }
    }

    @keyframes wanderer-bob {
      0%, 100% {
        transform: translateY(0) rotate(-1deg);
      }
      50% {
        transform: translateY(-5px) rotate(1.2deg);
      }
    }

    @keyframes wanderer-walk {
      0% {
        transform: translateY(0) rotate(-1.4deg) scaleY(0.99);
      }
      25% {

      }
      100% {
        transform: translateY(0) rotate(-1.4deg) scaleY(0.99);
      }
    }

      const normalizedViewMode = normalizeViewMode(viewMode);
      if (normalizedViewMode === "default") {
        document.body.removeAttribute("data-view");
      } else {
        document.body.dataset.view = normalizedViewMode;

      window.setTimeout(() => {

      const currentViewMode = normalizeViewMode(document.body.dataset.view || "default");

      const nextMode = viewModes[(currentIndex + 1) % viewModes.length];

      const requestFullscreen = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;

      await requestFullscreen.call(document.documentElement).catch?.(() => {});

      if (!document.fullscreenElement && !document.webkitFullscreenElement) return;
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (!exit) return;
      await exit.call(document).catch?.(() => {});
      syncFullscreenState();

    function startCampfireAmbience() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        soundToggle.hidden = true;
        return null;
      }

      const audioContext = new AudioContextClass();
      const masterGain = audioContext.createGain();
      masterGain.gain.value = 0.2;
      masterGain.connect(audioContext.destination);

      const cricketBus = audioContext.createGain();
      cricketBus.gain.value = 0.22;
      cricketBus.connect(masterGain);

      function scheduleCricket(delaySeconds) {
        const startTime = audioContext.currentTime + delaySeconds;
        const chirpCount = 3 + Math.floor(Math.random() * 4);
        const baseFrequency = 2900 + Math.random() * 1700;

        for (let index = 0; index < chirpCount; index += 1) {
          const chirpStart = startTime + index * (0.08 + Math.random() * 0.03);
          const chirpDuration = 0.028 + Math.random() * 0.02;
          const oscillator = audioContext.createOscillator();
          oscillator.type = "triangle";
          oscillator.frequency.setValueAtTime(baseFrequency, chirpStart);
          oscillator.frequency.exponentialRampToValueAtTime(baseFrequency * (1.02 + Math.random() * 0.02), chirpStart + chirpDuration);

          const chirpGain = audioContext.createGain();
          chirpGain.gain.setValueAtTime(0.0001, chirpStart);
          chirpGain.gain.linearRampToValueAtTime(0.012 + Math.random() * 0.01, chirpStart + 0.006);
          chirpGain.gain.exponentialRampToValueAtTime(0.0001, chirpStart + chirpDuration);

          const chirpFilter = audioContext.createBiquadFilter();
          chirpFilter.type = "bandpass";
          chirpFilter.frequency.value = baseFrequency;
          chirpFilter.Q.value = 5;

          oscillator.connect(chirpFilter);
          chirpFilter.connect(chirpGain);
          chirpGain.connect(cricketBus);

          oscillator.start(chirpStart);
          oscillator.stop(chirpStart + chirpDuration + 0.02);
        }
      }

      const cricketInterval = window.setInterval(() => {
        scheduleCricket(Math.random() * 0.24);
        if (Math.random() > 0.55) {
          scheduleCricket(0.24 + Math.random() * 0.32);
        }
      }, 1200 + Math.random() * 1200);

      return {
        audioContext,
        masterGain,
        cricketInterval,
        stop() {
          window.clearInterval(cricketInterval);
          masterGain.gain.cancelScheduledValues(audioContext.currentTime);
          masterGain.gain.setTargetAtTime(0.0001, audioContext.currentTime, 0.22);
          window.setTimeout(() => {
            audioContext.close();
          }, 450);
        }
      };
    }

    function syncSoundState() {
      const accessibleLabel = ambienceEnabled ? "사운드 끄기" : "사운드 켜기";
      soundToggle.setAttribute("aria-label", accessibleLabel);
      soundToggle.setAttribute("title", accessibleLabel);
      soundToggle.setAttribute("aria-pressed", String(ambienceEnabled));
    }

    function startAmbience() {
      if (!ambienceEnabled) {
        return;
      }

      fireAudio.volume = 0.28;
      fireAudio.play().catch(() => {});

      if (!ambience) {
        ambience = startCampfireAmbience();
      }
      if (ambience?.audioContext?.state === "suspended") {
        ambience.audioContext.resume().catch(() => {});
      }
    }

    function stopAmbience() {
      fireAudio.pause();
      fireAudio.currentTime = 0;
      ambience?.stop();
      ambience = null;
    }

    function toggleAmbience() {
      if (!ambienceEnabled) {
        ambienceEnabled = true;
        syncSoundState();
        startAmbience();
        return;
      }

      ambienceEnabled = false;
      syncSoundState();
      stopAmbience();
    }

    function getSeoulNow() {
      const now = new Date();
      const seoulText = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Seoul",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).format(now);

      return new Date(`${seoulText.replace(",", "")}+09:00`);
    }

    function getSeoulLunarDay() {
      try {
        const lunarParts = new Intl.DateTimeFormat("en-u-ca-chinese", {
          timeZone: "Asia/Seoul",
          month: "numeric",
          day: "numeric"
        }).formatToParts(new Date());

        const lunarDay = Number(
          lunarParts.find((part) => part.type === "day")?.value
        );

        if (Number.isFinite(lunarDay) && lunarDay >= 1 && lunarDay <= 30) {
          return lunarDay;
        }
      } catch (_) {
        // Fall back to astronomical approximation below when the lunar calendar
        // formatter is not available in the runtime.
      }

      return null;
    }

    async function syncMoonPhaseFromApi() {
      const now = Date.now();
      if (moonApiSnapshot && now - moonApiSyncAt < 5 * 60 * 1000) {
        return moonApiSnapshot;
      }

      const response = await fetch("/api/moon", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Moon API returned ${response.status}`);
      }

      const payload = await response.json();
      if (payload?.status !== "success" || payload?.verified !== true) {
        throw new Error("Moon API payload was not verified");
      }

      moonApiSnapshot = payload;
      moonApiSyncAt = now;
      return payload;
    }

    function applyMoonVisuals({
      illumination,
      phaseLabel,
      waxing,
      imageUrl,
    }) {
      const safeIllumination = Math.max(0, Math.min(1, illumination));
      const shadowOffset = safeIllumination * 100;
      const shadowX = waxing ? -shadowOffset : shadowOffset;
      const shadowScale = waxing ? 1 : -1;

      moonShadow.style.setProperty("--moon-shadow-x", `${shadowX}%`);
      moonShadow.style.setProperty("--moon-shadow-scale", `${shadowScale}`);
      moonShadow.style.setProperty("--moon-shadow-opacity", safeIllumination < 0.02 ? "0.98" : "1");

      if (imageUrl) {
        if (moonPhaseImageUrl !== imageUrl) {
          const imageLoader = new Image();
          moonPhaseImageUrl = imageUrl;

          imageLoader.onload = () => {
            if (moonPhaseImageUrl !== imageUrl) return;
            moon.style.setProperty("--moon-phase-image", `url("${imageUrl}")`);
            moon.classList.add("site-phase-active");
          };

          imageLoader.onerror = () => {
            if (moonPhaseImageUrl !== imageUrl) return;
            moon.style.removeProperty("--moon-phase-image");
            moon.classList.remove("site-phase-active");
          };

          imageLoader.src = imageUrl;
        } else if (moon.style.getPropertyValue("--moon-phase-image")) {
          moon.classList.add("site-phase-active");
        }
      } else {
        moonPhaseImageUrl = "";
        moon.style.removeProperty("--moon-phase-image");
        moon.classList.remove("site-phase-active");
      }

      const illuminationPercent = Math.round(safeIllumination * 100);
      moon.setAttribute("aria-label", `한국 기준 오늘의 달: ${phaseLabel}, 밝기 ${illuminationPercent}%`);
      moon.setAttribute("title", `한국 기준 오늘의 달: ${phaseLabel}, 밝기 ${illuminationPercent}%`);
    }

    function updateMoonPhaseFallback() {
      const lunarDay = getSeoulLunarDay();
      const mappedPhase = lunarDay ? lunarPhaseByDay[lunarDay] : null;
      let phaseLabel = mappedPhase?.label;
      let illumination = (mappedPhase?.illumination ?? 0) / 100;
      let waxing = lunarDay ? lunarDay <= 15 : true;

      if (!mappedPhase) {
        const seoulNow = getSeoulNow();
        const daysSinceKnownNewMoon = (seoulNow.getTime() - knownNewMoonUtc) / 86400000;
        const phaseAge = ((daysSinceKnownNewMoon % synodicMonth) + synodicMonth) % synodicMonth;
        const phaseRatio = phaseAge / synodicMonth;

        illumination = 0.5 * (1 - Math.cos(phaseRatio * Math.PI * 2));
        waxing = phaseRatio <= 0.5;
        phaseLabel = illumination > 0.97
          ? "보름달"
          : illumination < 0.08
            ? waxing ? "초승달" : "그믐달"
            : waxing
              ? "차오르는 달"
              : "기우는 달";
      }

      applyMoonVisuals({
        illumination,
        phaseLabel,
        waxing,
        imageUrl: mappedPhase?.imageDay
          ? `https://d5.co.kr/img/luna/1/${String(mappedPhase.imageDay).padStart(2, "0")}.png`
          : "",
      });
    }

    async function updateMoonPhase() {
      try {
        const payload = await syncMoonPhaseFromApi();
        const lunarDay = Number(payload?.date?.lunar?.day);
        const mappedPhase = Number.isFinite(lunarDay) ? lunarPhaseByDay[lunarDay] : null;
        const phaseLabel = payload?.moon?.phase || mappedPhase?.label || "오늘의 달";
        const illumination = Number(payload?.moon?.illumination ?? mappedPhase?.illumination ?? 0) / 100;
        const waxing = lunarDay ? lunarDay <= 15 : true;

        applyMoonVisuals({
          illumination,
          phaseLabel,
          waxing,
          imageUrl: payload?.moon?.imageUrl || "",
        });
      } catch (_) {
        updateMoonPhaseFallback();
      }
    }

    function resolveFireAudioSource() {
      fireAudio.src = fireAudioSrc;
      fireAudio.load();
    }

    function spawnEmber() {
      const ember = document.createElement("span");
      ember.className = "ember";

      const driftX = `${(Math.random() - 0.5) * 90}px`;
      const driftY = `${130 + Math.random() * 180}px`;
      const size = 2 + Math.random() * 4.5;
      const duration = 1.6 + Math.random() * 1.8;
      const delay = Math.random() * 0.8;
      const startX = 44 + Math.random() * 12;

      ember.style.left = `${startX}%`;
      ember.style.width = `${size}px`;
      ember.style.height = `${size}px`;
      ember.style.marginLeft = `${size / -2}px`;
      ember.style.setProperty("--drift-x", driftX);
      ember.style.setProperty("--drift-y", driftY);
      ember.style.animationDuration = `${duration}s`;
      ember.style.animationDelay = `${delay}s`;

      embers.appendChild(ember);

      window.setTimeout(() => {
        ember.remove();
      }, (duration + delay) * 1000);
    }

    resolveFireAudioSource();
    applyViewMode("default");
    updateMoonPhase();
    syncSoundState();
    unlockViewToggle();
    if (isViewTransitionPreview) {
      startViewTransitionPreview();
    } else {
      window.setTimeout(unlockViewToggle, 60 * 1000);
    }

    soundToggle.addEventListener("click", () => {
      toggleAmbience();
    });
    viewToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      cycleViewMode();
    });
    fullscreenToggle.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleFullscreen();
    });
    document.addEventListener("fullscreenchange", syncFullscreenState);
    document.addEventListener("webkitfullscreenchange", syncFullscreenState);

    window.setInterval(() => {
      spawnEmber();
    }, compactViewport ? 720 : 600);
    window.setInterval(() => {
      updateMoonPhase();
    }, 10 * 60 * 1000);
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "./src/vendor/three.module.js",
        "three/addons/": "./src/vendor/addons/"
      }
    }
  </script>
  <script type="module" src="./src/main.js?v=ground-contact-2"></script>

</body>
